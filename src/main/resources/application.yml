server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/uav_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: uav
    password: uav123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  rabbitmq:
    host: localhost
    port: 5672
    username: uav
    password: uav123
    listener:
      simple:
        concurrency: 2
        max-concurrency: 5

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# MAVSDK Bridge (WSL2)
mavsdk:
  bridge:
    url: http://localhost:8000
